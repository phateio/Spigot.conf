# This is the Bukkit commands configuration file for Paper.
#
# If you need help with the configuration or have any questions related to Paper,
# join us in our Discord or check the docs page.
#
# File Reference: https://docs.papermc.io/paper/reference/bukkit-commands-configuration/
# Docs: https://docs.papermc.io/
# Discord: https://discord.gg/papermc
# Website: https://papermc.io/

command-block-overrides: []
ignore-vanilla-permissions: false
aliases:
  icanhasbukkit:
  - version $1-
  spawn:
  - multiverse-core:mvspawn $1-
  jail:
  - execute as $$1 run function custom:admin/jail
  buff:
  - execute as $$1 run function custom:admin/buff
  strike:
  - execute at $$1- run summon lightning_bolt
  warp:
  - residence:residence tp $$1-
  kick:
  - minecraft:kick $$1 $$2-
  - 'discordsrv:discord broadcast :boot: **Kicked $$1 for $$2-**'
  ban:
  - minecraft:ban $$1 $$2-
  - 'discordsrv:discord broadcast :hammer: **Banned $$1 for $$2-**'
  gban:
  - minecraft:ban $$1 $$2-
  - 'discordsrv:discord broadcast :hammer: **Banned $$1 for $$2-**'
  unban:
  - minecraft:pardon $$1-
  - 'discordsrv:discord broadcast :cross: **Unbanned $1-**'
  aackick:
  - minecraft:kick $$1 $$2-
  - tellraw @a {"text":"[AAC] Kicked $$1 for $$2-", "color":"gold"}
  - 'discordsrv:discord broadcast :dizzy: **Kicked $$1 for $$2-**'
  party:
  - silentmute mute $$1
  - jail $$1
  - minecraft:effect give $$1 minecraft:instant_damage 1 5
  exphantom:
  - kill @e[distance=..32,type=minecraft:phantom]
  extinguish:
  - fill ~-10 ~-10 ~-10 ~10 ~10 ~10 minecraft:air replace minecraft:fire
  magickill:
  - minecraft:effect give $$1 minecraft:instant_damage 1 5
  rc:
  - rangedchat:rc
unrestricted-advancements: false
